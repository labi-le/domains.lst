mode: rule
allow-lan: true
bind-address: "*"
log-level: debug
ipv6: false
tproxy-port: 12342

iptables:
  inbound-interface: br-lan

proxies:
  - name: VPN
    type: direct
    udp: true
    interface-name: awg2

  - name: WARP-AWG1
    type: direct
    udp: true
    interface-name: awg1

  - name: WARP-AWG0
    type: direct
    udp: true
    interface-name: awg0

hosts:
  "t.me": "149.154.167.99"
  "telegram.org": "149.154.167.99"
  "www.telegram.org": "149.154.167.99"
  "web.telegram.org": "149.154.167.99"
  "desktop.telegram.org": "149.154.167.99"
  "telesco.pe": "149.154.167.99"

dns:
  enable: true
  listen: 0.0.0.0:12344
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.1.0/24
  store-fake-ip: true
  fake-ip-filter-mode: rule
  fake-ip-filter:
    - DOMAIN-SUFFIX,lan,real-ip
    - DOMAIN-SUFFIX,local,real-ip
    - RULE-SET,vpn,fake-ip
    - RULE-SET,warp,fake-ip
    - MATCH,real-ip
  nameserver:
    - 127.0.0.1:5453

proxy-providers:
  # Pre-filtered raw URI list served by sub-preprocessor (https://github.com/labi-le/sub-preprocessor)
  stable:
    type: http
    url: "http://192.168.1.2:7008/stable.txt"
    path: ./providers/stable.yaml
    interval: 3600
    health-check:
      enable: true
      url: "https://gstatic.com/generate_204"
      interval: 120
      timeout: 2000
      lazy: false
      expected-status: 204

proxy-groups:
  - name: WARP
    type: fallback
    proxies:
      - WARP-AWG0
      - WARP-AWG1
    url: "https://www.gstatic.com/generate_204"
    interval: 900
    tolerance: 150
    expected-status: 204

  - name: VPN-ALL-AUTO
    type: url-test
    use:
      - stable
    url: "https://gstatic.com/generate_204"
    interval: 120
    timeout: 2000
    tolerance: 150
    lazy: false
    expected-status: 204
    max-failed-times: 1

  - name: VPN-PREFERRED
    type: fallback
    proxies:
      - REJECT
      - VPN-ALL-AUTO
      - VPN
    url: "https://gstatic.com/generate_204"
    interval: 120
    lazy: false
    timeout: 2000
    expected-status: 204
    max-failed-times: 1

rule-providers:
  vpn:
    type: file
    path: ./rules/vpn.txt
    behavior: classical
    format: text

  warp:
    type: file
    path: ./rules/warp.txt
    behavior: classical
    format: text

rules:
  - RULE-SET,vpn,VPN-PREFERRED
  - RULE-SET,warp,WARP
  - MATCH,DIRECT
